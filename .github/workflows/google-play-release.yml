name: Deploy to Google Play Store

on:
  push:
    branches:
      - main # Production
      - beta # Open Beta
      - alpha # Closed Alpha
      - internal # Internal Testing
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build_and_deploy:
    name: Build & Deploy Android App
    runs-on: ubuntu-latest
    environment: internal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set versionCode from run number
        run: |
          jq --argjson vc ${{ github.run_number }} '.expo.android.versionCode = $vc' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "versionCode set to ${{ github.run_number }}"

      - name: Set build architectures
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "RN_ARCHITECTURES=armeabi-v7a,arm64-v8a" >> $GITHUB_ENV
          else
            # Internal/alpha/beta: arm64-v8a only — skips 32-bit native recompilation
            echo "RN_ARCHITECTURES=arm64-v8a" >> $GITHUB_ENV
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/internal' }}

      - name: Generate native Android project
        run: pnpm exec expo prebuild --platform android --no-install


      - name: Inject release keystore for signing
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 --decode > android/app/release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=app/release.keystore
          storePassword=${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build Android Release App Bundle (AAB)
        env:
          NODE_ENV: production
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          cd android
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=${{ env.RN_ARCHITECTURES }} \
            --parallel \
            --build-cache \
            --configuration-cache \
            --max-workers=8 \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"


      - name: Determine Google Play Track
        id: determine_track
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "TRACK=production" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/beta" ]; then
            echo "TRACK=beta" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/alpha" ]; then
            echo "TRACK=alpha" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/internal" ]; then
            echo "TRACK=internal" >> $GITHUB_ENV
          else
            echo "TRACK=internal" >> $GITHUB_ENV
          fi

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS_JSON }}
          packageName: com.hanushh.paysplit
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: ${{ env.TRACK }}
          status: draft
