name: Deploy to Google Play Store

on:
  push:
    tags:
      - "v*" # Trigger deployment when a version tag is pushed (e.g., git tag v1.0.0 && git push origin --tags)
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build_and_deploy:
    name: Build & Deploy Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Android Release App Bundle (AAB)
        run: pnpm run build:android

      - name: Sign Android App Bundle
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS_JSON }}
          packageName: com.hanushh.splitwise
          releaseFiles: ${{ steps.sign_app.outputs.signedReleaseFile }}
          track: internal # Deploy to internal testing track
          status: draft # Create as a draft release
