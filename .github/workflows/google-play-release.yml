name: Deploy to Google Play Store

on:
  push:
    branches:
      - main # Production
      - beta # Open Beta
      - alpha # Closed Alpha
      - internal # Internal Testing
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build_and_deploy:
    name: Build & Deploy Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/package.json', '**/app.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate native Android project
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Build Android Release App Bundle (AAB)
        env:
          NODE_ENV: production
        run: |
          cd android
          ./gradlew bundleRelease \
            --parallel \
            --build-cache \
            --max-workers=4 \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"

      - name: Sign Android App Bundle
        id: sign_app
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_ALIAS: ${{ secrets.ANDROID_ALIAS }}
          ANDROID_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          KEYSTORE_PATH="android/app/build/outputs/bundle/release/signingKey.keystore"
          SANITIZED_SIGNING_KEY="$(printf '%s' "${ANDROID_SIGNING_KEY:-}" | tr -d '\r\n\t ')"

          if [ ! -f "$AAB_PATH" ]; then
            echo "Expected AAB not found at $AAB_PATH"
            exit 1
          fi

          if [ -z "$SANITIZED_SIGNING_KEY" ]; then
            echo "::error::ANDROID_SIGNING_KEY is empty or missing. Set this GitHub Actions secret to the base64-encoded keystore file."
            exit 1
          fi

          if [ -z "${ANDROID_ALIAS:-}" ] || [ -z "${ANDROID_KEY_STORE_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "::error::One or more signing secrets are missing: ANDROID_ALIAS, ANDROID_KEY_STORE_PASSWORD, ANDROID_KEY_PASSWORD."
            exit 1
          fi

          printf '%s' "$SANITIZED_SIGNING_KEY" | base64 --decode > "$KEYSTORE_PATH"

          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "::error::Decoded keystore is empty at $KEYSTORE_PATH. Ensure ANDROID_SIGNING_KEY is valid base64 for your keystore file."
            exit 1
          fi

          signed=0
          for store_type in PKCS12 JKS; do
            echo "Trying jarsigner with keystore type: $store_type"
            if jarsigner \
              -keystore "$KEYSTORE_PATH" \
              -storetype "$store_type" \
              -storepass "$ANDROID_KEY_STORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              "$AAB_PATH" \
              "$ANDROID_ALIAS"; then
              signed=1
              break
            fi
          done

          if [ "$signed" -ne 1 ]; then
            echo "Failed to sign AAB with both PKCS12 and JKS keystore types."
            exit 1
          fi

          echo "signedReleaseFile=$AAB_PATH" >> "$GITHUB_OUTPUT"

      - name: Determine Google Play Track
        id: determine_track
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "TRACK=production" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/beta" ]; then
            echo "TRACK=beta" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/alpha" ]; then
            echo "TRACK=alpha" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/internal" ]; then
            echo "TRACK=internal" >> $GITHUB_ENV
          else
            echo "TRACK=internal" >> $GITHUB_ENV
          fi

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_CREDENTIALS_JSON }}
          packageName: com.hanushh.paysplit
          releaseFiles: ${{ steps.sign_app.outputs.signedReleaseFile }}
          track: ${{ env.TRACK }}
          status: draft # Create as a draft release
