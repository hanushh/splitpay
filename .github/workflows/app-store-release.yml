name: Deploy to App Store

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.cursorrules'
      - 'llms.txt'
      - 'AI.md'
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build & Deploy iOS App
    runs-on: macos-latest
    environment: internal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

      - name: Set up EAS CLI
        run: npm install -g eas-cli

      - name: Write .env.production
        run: |
          printf 'EXPO_PUBLIC_SUPABASE_URL=%s\nEXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" \
            "${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" \
            > .env.production

      - name: Build iOS app via EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile production --non-interactive

      - name: Submit to App Store
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: eas submit --platform ios --profile production --non-interactive --latest
